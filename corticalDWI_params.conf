# corticalDWI pipeline parameters
# ──────────────────────────────────────────────────────────────────────────────
# This file is sourced by individual pipeline scripts.
# Values here are repo-wide defaults.
#
# To override for a specific study, copy this file to $SUBJECTS_DIR and edit
# the values there. Study-level settings take priority over these defaults.
#
# Individual command-line arguments always win over both config files.
# ──────────────────────────────────────────────────────────────────────────────

target_type=ico6_sym          # surface template (fsLR-32k, ico6_sym, …)
nsteps=100                     # streamline integration steps
step_size=0.1                  # integration step size (mm)
tck_step_size=0.5              # resampled streamline step size (mm)
max_length=10                  # max streamline length after warp (mm)
nDepths=30                     # cortical depth points to extract
fixel_dir=csd_fixels_singletissue  # fixel directory name (relative to dwi/)
angle=45                       # max fixel–streamline angle (degrees)
