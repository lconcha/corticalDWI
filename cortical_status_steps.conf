# corticalDWI pipeline step definitions
# ──────────────────────────────────────────────────────────────────────────────
# Format:  label | long_name | relative_output_file
#
#   label (lbl)         Short name shown in the status table (≤5 chars recommended).
#   long_name           Human-readable step description.
#   relative_output_file Path relative to SUBJECTS_DIR/subject_id/ that signals
#                       the step is done.  Use {target_type} as a placeholder;
#                       it is substituted at runtime with the value of -t.
#
# Lines starting with # and blank lines are ignored.
# ──────────────────────────────────────────────────────────────────────────────

# lbl | long_name                             | relative_output_file
LAP   | cortical_compute_laplacian            | mri/laplace-wm_vec.nii.gz
SRF   | cortical_resample_surface_ico6_sym    | surf/lh_white_ico6_sym.surf.gii
S.lh  | cortical_compute_streamlines (lh)     | mri/lh_{target_type}_laplace-wm-streamlines.tck
S.rh  | cortical_compute_streamlines (rh)     | mri/rh_{target_type}_laplace-wm-streamlines.tck
REG   | cortical_register_t1_to_dwi           | dwi/t1native_to_b0_1Warp.nii.gz
W.lh  | cortical_warp_tck_to_dwi (lh)         | dwi/lh_{target_type}_laplace-wm-streamlines_dwispace.tck
W.rh  | cortical_warp_tck_to_dwi (rh)         | dwi/rh_{target_type}_laplace-wm-streamlines_dwispace.tck
DTI   | cortical_DTI                          | dwi/fa.nii.gz
sDTI  | sample DTI (lh)                       | dwi/lh_{target_type}_fa.tsf
sDTI  | sample DTI (rh)                       | dwi/rh_{target_type}_fa.tsf
CSD   | cortical_CSD                          | dwi/fod_wm.mif
sCSD  | sample CSD (lh)                       | dwi/csd_fixels/lh_{target_type}_afd-par.tsf
sCSD  | sample CSD (rh)                       | dwi/csd_fixels/rh_{target_type}_afd-par.tsf
MRDS  | cortical_MRDS                         | dwi/mrds_fixels/index.mif
sMRDS | sample MRDS (lh)                      | dwi/lh_${target_type}_FA-par-perp-indices.tsf
sMRDS | sample MRDS (rh)                      | dwi/rh_${target_type}_FA-par-perp-indices.tsf