# corticalDWI pipeline step definitions
# ──────────────────────────────────────────────────────────────────────────────
# Format:  label | long_name | relative_output_file
#
#   label (lbl)         Short name shown in the status table (≤5 chars recommended).
#   long_name           Human-readable step description.
#   relative_output_file Path relative to SUBJECTS_DIR/subject_id/ that signals
#                       the step is done.  Use {target_type} as a placeholder;
#                       it is substituted at runtime with the value of -t.
#                       Use {fixel_dir} as a placeholder; it is substituted
#                       with the fixel_dir value from corticalDWI_params.conf.
#
# Lines starting with # and blank lines are ignored.
# ──────────────────────────────────────────────────────────────────────────────

# lbl | long_name                             | relative_output_file
Lapl   | cortical_compute_laplacian            | mri/laplace-wm_vec.nii.gz
Sres   | cortical_resample_surface_ico6_sym    | surf/lh_white_ico6_sym.surf.gii
Str.lh | cortical_compute_streamlines (lh)     | mri/lh_{target_type}_laplace-wm-streamlines.tck
Str.rh | cortical_compute_streamlines (rh)     | mri/rh_{target_type}_laplace-wm-streamlines.tck
Reg    | cortical_register_t1_to_dwi           | dwi/t1native_to_b0_1Warp.nii.gz
Wtk.lh | cortical_warp_tck_to_dwi (lh)       | dwi/lh_{target_type}_laplace-wm-streamlines_dwispace.tck
Wtk.rh | cortical_warp_tck_to_dwi (rh)       | dwi/rh_{target_type}_laplace-wm-streamlines_dwispace.tck
DTI    | cortical_DTI                          | dwi/fa.nii.gz
sDTIl  | sample DTI (lh)                       | dwi/lh_{target_type}_fa.tsf
sDTIr  | sample DTI (rh)                       | dwi/rh_{target_type}_fa.tsf
CSD    | cortical_CSD                          | dwi/fod_wm.mif
sCSDl  | sample CSD (lh)                       | dwi/{fixel_dir}/lh_{target_type}_afd-par.tsf
sCSDr  | sample CSD (rh)                       | dwi/{fixel_dir}/rh_{target_type}_afd-par.tsf
MRDS   | cortical_MRDS                         | dwi/mrds_fixels/index.mif
sMRDSl | sample MRDS (lh)                      | dwi/lh_{target_type}_FA-par-perp-indices.tsf
sMRDSr | sample MRDS (rh)                      | dwi/rh_{target_type}_FA-par-perp-indices.tsf
DKI    | cortical_DKI                          | dwi/dki/ak.nii.gz
T1proc | cortical_proc_t1                      | mri/T1w_proc.nii.gz
Fproc  | cortical_proc_FLAIR.sh                | mri/flair_proc.nii.gz